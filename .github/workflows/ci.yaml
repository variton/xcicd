name: CI

on:
  push:
    branches:
      - "**"
  #pull_request:

jobs:
  branch-scan:
    uses: ./.github/workflows/scan.yaml
    with:
      project: XCI
      repository: ${{ github.repository }}
      branch: ${{ github.ref_name }}
      label: ${{ github.event.head_commit.message }}
    secrets:
      CITK: ${{ secrets.XCITK }}
      CI_WEBHOOK_URL: ${{ secrets.XCI_WEBHOOK_URL }}
